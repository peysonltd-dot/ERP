<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Peyson 雲端 ERP 系統</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Firebase Compat (相容模式) -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
</head>
<body class="bg-gray-50">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef } from 'https://esm.sh/react@18.2.0';
    import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
    import { 
      LayoutDashboard, Package, FileText, Settings, Search, Wand2, Download, CheckCircle2, 
      AlertCircle, Loader2, Building2, ShoppingCart, Trash2, Cloud, Filter, Users, LogOut, 
      User, Shield, ArrowRight, Plus, Stamp, FileSignature, X, Eye, FileDigit, CheckSquare, 
      Square, Edit3, Save, ArrowLeft, ImagePlus, UploadCloud, Upload, Briefcase, DollarSign, 
      Gift, Menu, UserCheck, Lock, Key, Cpu
    } from 'https://esm.sh/lucide-react@0.294.0?deps=react@18.2.0';

    // ==========================================
    // --- Firebase 初始化 (Compat 模式) ---
    // ==========================================
    const firebaseConfig = {
      apiKey: "AIzaSyC2urkxTWNz1EVy08MxyGfmAcPjGaU95CA",
      authDomain: "peyson-erp.firebaseapp.com",
      projectId: "peyson-erp",
      storageBucket: "peyson-erp.firebasestorage.app",
      messagingSenderId: "350290827046",
      appId: "1:350290827046:web:f1ff892ac31e7f3912d3e7",
      measurementId: "G-G9ZEWEXVBS"
    };

    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.firestore();
    const storage = firebase.storage();

    // --- 分類常數 ---
    const categoryTree = {
      "餐廚用品": ["開瓶器", "杯墊", "冰塊", "環保餐具"],
      "水瓶/杯子": ["環保杯", "保溫杯", "馬克杯", "水壺", "酒杯/茶杯"],
      "包包袋子": ["帆布袋", "飲料提袋", "手提袋", "收納袋", "背包"],
      "文具 | 商務禮品": ["筆", "金屬筆", "廣告筆", "捲尺 | 尺", "便條紙", "證件套", "文具袋", "資料夾", "辦公周邊", "月曆", "筆記本"],
      "旅行戶外": ["汽車用品", "行李箱周邊", "旅行插頭", "雨具 | 傘", "風扇", "露營用品"],
      "家居用品": ["抱枕", "毛毯", "毛巾", "收納"],
      "電子產品/周邊": ["充電線", "行動電源", "無線充電盤", "手機背繩", "藍芽音響", "卡套", "其他3C", "周邊小物"],
      "生活小物": ["拼圖", "鑰匙圈", "手機架", "捲尺"],
      "ESG環保禮品": [],
      "服飾": ["T恤", "大學T", "帽T", "帽子", "飾品"],
      "高爾夫專區": [],
      "禮物包裝": []
    };

    // ==========================================
    // 元件 1：簡易安全登入畫面
    // ==========================================
    const SimpleLogin = ({ onLogin }) => {
      const [username, setUsername] = useState('');
      const [password, setPassword] = useState('');
      const [error, setError] = useState('');

      const handleSubmit = (e) => {
        e.preventDefault();
        if (username === '93605882' && password === '05882') {
          onLogin();
        } else {
          setError('帳號或密碼錯誤！請聯絡管理員。');
        }
      };

      return (
        <div className="min-h-screen bg-gray-50 flex items-center justify-center p-4">
          <div className="bg-white p-8 rounded-2xl shadow-xl border border-gray-100 w-full max-w-md animate-in fade-in zoom-in duration-300">
            <div className="text-center mb-8">
              <div className="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg">
                <Shield className="w-8 h-8 text-white" />
              </div>
              <h1 className="text-2xl font-bold tracking-wider text-gray-900">PEYSON<span className="text-blue-500">.ERP</span></h1>
              <p className="text-gray-500 text-sm mt-2">請輸入企業專屬代碼以登入系統</p>
            </div>
            <form onSubmit={handleSubmit} className="space-y-5">
              <div>
                <label className="block text-sm font-medium text-gray-700 mb-1">企業帳號</label>
                <div className="relative">
                  <User className="w-5 h-5 absolute left-3 top-2.5 text-gray-400" />
                  <input type="text" required value={username} onChange={e => setUsername(e.target.value)} className="w-full pl-10 pr-4 py-2.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" placeholder="請輸入帳號" />
                </div>
              </div>
              <div>
                <label className="block text-sm font-medium text-gray-700 mb-1">登入密碼</label>
                <div className="relative">
                  <Lock className="w-5 h-5 absolute left-3 top-2.5 text-gray-400" />
                  <input type="password" required value={password} onChange={e => setPassword(e.target.value)} className="w-full pl-10 pr-4 py-2.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" placeholder="請輸入密碼" />
                </div>
              </div>
              {error && <div className="p-3 bg-red-50 text-red-600 text-sm rounded-lg flex items-center gap-2"><AlertCircle className="w-4 h-4 shrink-0"/> {error}</div>}
              <button type="submit" className="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-bold shadow-md transition-all flex justify-center items-center gap-2">登入系統</button>
            </form>
          </div>
        </div>
      );
    };

    // ==========================================
    // 元件 2：AI 流水線工作台 (接上 Firebase)
    // ==========================================
    const AIImportView = () => {
      const [rawText, setRawText] = useState('');
      const [moq, setMoq] = useState(50);
      const [mainCategory, setMainCategory] = useState(Object.keys(categoryTree)[0]);
      const [subCategory, setSubCategory] = useState(categoryTree[Object.keys(categoryTree)[0]][0] || '');
      const [customOptions, setCustomOptions] = useState(['雷射雕刻']);
      const availableOptions = ["雷射雕刻", "網版印刷", "彩色UV直印", "燙金/燙銀", "皮革壓印", "客製化外包裝盒"];
      
      const [specImageBase64, setSpecImageBase64] = useState(null);
      const fileInputRef = useRef(null);
      const specInputRef = useRef(null);

      const [aiModel, setAiModel] = useState('gemini-1.5-pro');
      const [aiResult, setAiResult] = useState(null);
      const [isGenerating, setIsGenerating] = useState(false);
      const [isSaving, setIsSaving] = useState(false);
      const [error, setError] = useState('');
      const [successMsg, setSuccessMsg] = useState('');

      const handleOptionToggle = (opt) => setCustomOptions(prev => prev.includes(opt) ? prev.filter(o => o !== opt) : [...prev, opt]);
      const handleMainCategoryChange = (e) => { const selectedMain = e.target.value; setMainCategory(selectedMain); setSubCategory(categoryTree[selectedMain][0] || ''); };

      const handleSpecImageUpload = (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onloadend = () => setSpecImageBase64({ mimeType: file.type, data: reader.result.split(',')[1] });
          reader.readAsDataURL(file);
        }
      };

      // ✅ 監聽雲端處理結果
      useEffect(() => {
        const unsubscribe = db.collection('products')
          .where('status', '==', 'completed')
          .orderBy('updatedAt', 'desc')
          .limit(1)
          .onSnapshot((snapshot) => {
            snapshot.docChanges().forEach((change) => {
              if (change.type === "added" || change.type === "modified") {
                const docData = change.doc.data();
                if (docData.aiResult) {
                   setAiResult(docData.aiResult);
                   setSuccessMsg(`✨ 雲端處理完成：${docData.aiResult.title_zh}`);
                   setTimeout(() => setSuccessMsg(''), 5000);
                }
              }
            });
          }, (error) => {
            console.error("監聽資料庫失敗:", error);
          });

        return () => unsubscribe();
      }, []);

      // ✅ 將任務發送至 Firebase
      const handleGenerate = async () => {
        if (!rawText.trim() && !specImageBase64) return setError('請貼上文字說明或上傳規格圖片！');
        
        setError(''); setSuccessMsg(''); setIsGenerating(true); 

        try {
          let imageUrl = null;

          if (specImageBase64) {
            setSuccessMsg('上傳圖片至雲端...');
            const byteCharacters = atob(specImageBase64.data);
            const byteNumbers = new Array(byteCharacters.length);
            for (let i = 0; i < byteCharacters.length; i++) {
                byteNumbers[i] = byteCharacters.charCodeAt(i);
            }
            const byteArray = new Uint8Array(byteNumbers);
            const blob = new Blob([byteArray], { type: specImageBase64.mimeType });

            const fileName = `specs/${Date.now()}.jpg`;
            const storageRef = storage.ref().child(fileName);
            await storageRef.put(blob);
            imageUrl = await storageRef.getDownloadURL();
          }

          setSuccessMsg('建立雲端任務中...');

          const customStr = customOptions.length > 0 ? customOptions.join('、') : '一般客製化';
          await db.collection('products').add({
            status: 'pending',
            rawText: rawText,
            imageUrl: imageUrl,
            moq: moq,
            category: `${mainCategory} - ${subCategory}`,
            customOptions: customStr,
            aiModel: aiModel,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
          });

          // 瞬間清空畫面
          setRawText('');
          setSpecImageBase64(null);
          if (specInputRef.current) specInputRef.current.value = '';
          
          setIsGenerating(false);
          setSuccessMsg('✅ 任務已送交雲端！您可以直接輸入下一筆商品。');
          setTimeout(() => setSuccessMsg(''), 4000);

        } catch (err) {
          console.error("上傳失敗:", err);
          setError(`任務建立失敗: ${err.message}`);
          setIsGenerating(false);
        }
      };

      const handlePreviewChange = (field, val) => { setAiResult({ ...aiResult, [field]: val }); };

      const handleSave = async () => {
        if (!aiResult) return;
        setIsSaving(true); setError(''); setSuccessMsg('');
        try {
          const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(aiResult, null, 2));
          const dlAnchorElem = document.createElement('a');
          dlAnchorElem.setAttribute("href", dataStr);
          dlAnchorElem.setAttribute("download", `Product_${new Date().getTime()}.json`);
          dlAnchorElem.click();
          setSuccessMsg(`✅ 商品 [${aiResult.title_zh}] 已成功匯出！`);
        } catch (err) {
          setError(`儲存失敗: ${err.message}`);
        } finally {
          setIsSaving(false);
        }
      };

      return (
        <div className="p-8 max-w-[1600px] h-[calc(100vh-64px)] flex flex-col mx-auto animate-in fade-in duration-300">
          <div className="mb-6 flex justify-between items-end">
            <div>
              <h2 className="text-2xl font-bold text-gray-800 flex items-center gap-2">
                <Wand2 className="w-6 h-6 text-blue-600"/> AI 快速建檔流水線
              </h2>
              <p className="text-gray-500 text-sm mt-1">資料送出後即可建立下一筆，系統將在背景自動處理。</p>
            </div>
            <div className="bg-white p-2 rounded-lg border border-gray-200 shadow-sm flex items-center gap-3">
               <Cpu className="w-5 h-5 text-gray-500" />
               <span className="text-sm font-bold text-gray-700">選擇 AI 大腦：</span>
               <select 
                 value={aiModel} 
                 onChange={(e) => setAiModel(e.target.value)}
                 className="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-md focus:ring-blue-500 focus:border-blue-500 p-1.5"
               >
                  <option value="gemini-1.5-pro">Gemini 1.5 Pro</option>
                  <option value="gemini-1.5-flash">Gemini 1.5 Flash</option>
               </select>
            </div>
          </div>

          <div className="flex-1 grid grid-cols-1 lg:grid-cols-2 gap-8 min-h-0">
            {/* 左側輸入區 */}
            <div className="bg-white rounded-2xl shadow-sm border border-gray-200 flex flex-col overflow-hidden">
              <div className="bg-gray-50 px-6 py-4 border-b border-gray-200 font-bold text-gray-700 flex items-center gap-2"><Plus className="w-5 h-5 text-blue-500"/> 1. 輸入商品基礎資料</div>
              <div className="p-6 flex-1 overflow-y-auto space-y-6">
                <div><label className="block text-sm font-bold text-gray-700 mb-2">1688 原始說明 (文字)</label><textarea value={rawText} onChange={e => setRawText(e.target.value)} className="w-full h-32 p-3 border border-gray-300 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none" placeholder="將廠商的規格說明直接貼在這裡..."/></div>
                <div className="grid grid-cols-2 gap-4">
                  <div><label className="block text-sm font-bold text-gray-700 mb-2">規格截圖 (自動上傳雲端)</label><input type="file" ref={specInputRef} onChange={handleSpecImageUpload} accept="image/*" className="w-full p-2 border border-gray-300 rounded-xl text-sm file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-blue-50 file:text-blue-700"/></div>
                </div>
                <div className="grid grid-cols-2 gap-4 pt-4 border-t border-gray-100">
                  <div className="space-y-4">
                    <div><label className="block text-sm font-bold text-gray-700 mb-2">上架分類</label><select value={mainCategory} onChange={handleMainCategoryChange} className="w-full p-2 border border-gray-300 rounded-xl text-sm bg-white mb-2">{Object.keys(categoryTree).map(m => <option key={m} value={m}>{m}</option>)}</select><select value={subCategory} onChange={e => setSubCategory(e.target.value)} className="w-full p-2 border border-gray-300 rounded-xl text-sm bg-white" disabled={!categoryTree[mainCategory] || categoryTree[mainCategory].length===0}>{categoryTree[mainCategory]?.map(s => <option key={s} value={s}>{s}</option>) || <option>無次分類</option>}</select></div>
                    <div><label className="block text-sm font-bold text-gray-700 mb-2">企業起訂量 (MOQ)</label><input value={moq} onChange={e => setMoq(e.target.value)} type="number" className="w-full p-2 border border-gray-300 rounded-xl text-sm" /></div>
                  </div>
                  <div><label className="block text-sm font-bold text-gray-700 mb-2">支援客製化工藝</label><div className="flex flex-wrap gap-2">{availableOptions.map(opt => <button key={opt} onClick={() => handleOptionToggle(opt)} className={`px-3 py-1.5 text-xs font-medium rounded-lg border transition-colors ${customOptions.includes(opt) ? 'bg-blue-50 border-blue-300 text-blue-700' : 'bg-white border-gray-200 text-gray-500 hover:bg-gray-50'}`}>{opt}</button>)}</div></div>
                </div>
              </div>
              <div className="p-6 bg-gray-50 border-t border-gray-200">
                {error && <div className="mb-4 p-3 bg-red-50 text-red-600 text-sm rounded-lg flex items-center gap-2"><AlertCircle className="w-5 h-5 shrink-0"/> {error}</div>}
                {successMsg && <div className="mb-4 p-3 bg-green-100 text-green-700 text-sm rounded-lg flex items-center gap-2"><CheckCircle2 className="w-5 h-5 shrink-0"/> {successMsg}</div>}
                <button onClick={handleGenerate} disabled={isGenerating} className={`w-full py-4 rounded-xl font-bold flex items-center justify-center gap-2 shadow-md transition-all text-lg ${isGenerating ? 'bg-gray-300 text-gray-600 cursor-not-allowed' : 'bg-blue-600 hover:bg-blue-700 text-white'}`}>
                  {isGenerating ? <><Loader2 className="w-6 h-6 animate-spin"/> 送交雲端中...</> : <><Cloud className="w-6 h-6"/> 2. 送出處理 (背景執行)</>}
                </button>
              </div>
            </div>

            {/* 右側預覽區 */}
            <div className="bg-white rounded-2xl shadow-sm border border-gray-200 flex flex-col overflow-hidden relative">
               <div className="bg-gray-800 px-6 py-4 border-b border-gray-900 font-bold text-white flex justify-between items-center"><span className="flex items-center gap-2"><Eye className="w-5 h-5 text-green-400"/> 3. 最新處理完成預覽</span></div>
               <div className="flex-1 overflow-y-auto p-6 bg-gray-50/50 relative">
                 {!aiResult && (
                    <div className="absolute inset-0 flex flex-col items-center justify-center text-gray-400">
                       <FileText className="w-16 h-16 mb-4 opacity-20" />
                       <p>等待雲端處理完成中...</p>
                    </div>
                 )}
                 {aiResult && (
                    <div className="space-y-6 animate-in slide-in-from-bottom-4 duration-500 pb-20">
                      <div className="bg-white p-5 rounded-xl border border-blue-100 shadow-sm space-y-4">
                        <h3 className="font-bold text-blue-800 border-b border-blue-50 pb-2">🇹🇼 繁體中文版</h3>
                        <div><label className="block text-xs font-bold text-gray-500 mb-1">商品名稱</label><input type="text" value={aiResult.title_zh || ''} onChange={e => handlePreviewChange('title_zh', e.target.value)} className="w-full p-2 border border-gray-200 rounded text-sm font-bold text-gray-900" /></div>
                        <div><label className="block text-xs font-bold text-gray-500 mb-1">詳細描述</label><textarea value={aiResult.description_zh || ''} onChange={e => handlePreviewChange('description_zh', e.target.value)} className="w-full p-3 border border-gray-200 rounded text-sm min-h-[150px]" /></div>
                      </div>
                    </div>
                 )}
               </div>
               <div className="p-6 bg-white border-t border-gray-200 absolute bottom-0 left-0 right-0">
                  <button onClick={handleSave} disabled={!aiResult || isSaving} className={`w-full py-4 rounded-xl font-bold flex items-center justify-center gap-2 shadow-lg transition-all text-lg ${!aiResult ? 'bg-gray-100 text-gray-400 cursor-not-allowed' : 'bg-green-600 hover:bg-green-500 text-white'}`}>
                    <Save className="w-6 h-6"/> 確認無誤，匯出資料
                  </button>
               </div>
            </div>
          </div>
        </div>
      );
    };

    function App() {
      const [isLoggedIn, setIsLoggedIn] = useState(false);
      const [activeTab, setActiveTab] = useState('ai-import');
      const loggedInEmployee = { username: '最高管理員', role: 'Admin' };

      if (!isLoggedIn) {
        return <SimpleLogin onLogin={() => setIsLoggedIn(true)} />;
      }

      return (
        <div className="flex min-h-screen bg-gray-50 font-sans">
          <div className="bg-gray-900 text-white w-64 min-h-screen flex flex-col shrink-0">
            <div className="p-6 border-b border-gray-800"><h1 className="text-2xl font-bold tracking-wider">PEYSON<span className="text-blue-500">.ERP</span></h1></div>
            <nav className="flex-1 py-4">
              <button onClick={() => setActiveTab('ai-import')} className={`w-full flex items-center py-3 px-6 gap-3 text-sm transition-colors ${activeTab === 'ai-import' ? 'bg-blue-600 text-white border-r-4 border-blue-400' : 'text-gray-400'}`}><Wand2 className="w-5 h-5 shrink-0" /> AI 流水線</button>
            </nav>
          </div>
          <main className="flex-1 overflow-y-auto relative">
            {activeTab === 'ai-import' && <AIImportView />}
          </main>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
